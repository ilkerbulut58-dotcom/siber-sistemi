services:
  benchmark-web:
    image: nginx:1.27.4-alpine
    profiles: ["benchmark"]
    networks: [benchmark_internal]
    ports:
      - "18080:8080"
    volumes:
      - ./benchmarks/docker/web.conf:/etc/nginx/conf.d/default.conf:ro
  benchmark-api:
    image: nginx:1.27.4-alpine
    profiles: ["benchmark"]
    networks: [benchmark_internal]
    ports:
      - "18081:8080"
    volumes:
      - ./benchmarks/docker/api.conf:/etc/nginx/conf.d/default.conf:ro
networks:
  benchmark_internal:
    driver: bridge
