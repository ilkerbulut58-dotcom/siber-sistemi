server {
  listen 8080;
  server_name benchmark-api;

  add_header X-Powered-By "BenchmarkAPI/1.0" always;
  add_header Access-Control-Allow-Origin "*" always;
  add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS" always;

  location = /api/health {
    default_type application/json;
    return 200 '{"status":"ok","fixture":"benchmark-api"}';
  }

  location = /api/docs {
    default_type text/html;
    return 200 '<html><body>Public API documentation</body></html>';
  }

  location = /api/error {
    default_type application/json;
    return 500 '{"error":"Internal failure","stack":"Traceback (most recent call last)"}';
  }

  location /api/ {
    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin "*" always;
      return 204;
    }
    return 404;
  }

  location = / {
    default_type text/plain;
    return 200 "benchmark-api fixture\n";
  }
}
