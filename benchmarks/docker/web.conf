server {
  listen 8080;
  server_name benchmark-web;

  add_header X-Powered-By "BenchmarkFixture/1.0" always;
  add_header Set-Cookie "session=benchmark123; Path=/" always;

  location = /.well-known/security.txt {
    default_type text/plain;
    return 200 "Contact: benchmark@example.com\nPolicy: https://example.com/policy\n";
  }

  location / {
    default_type text/html;
    return 200 '<html><body>password="benchmark-leak-12345"</body></html>';
  }
}
