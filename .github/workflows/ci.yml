        timeout-minutes: 15
        env:
          DATABASE_URL: postgresql+asyncpg://siber:siber@host.docker.internal:5432/siber
          REDIS_URL: redis://host.docker.internal:6379/0
          BENCHMARK_GATE_MODE: report
          BENCHMARK_STORAGE_PATH: /tmp/siber-benchmark-active
        run: bash scripts/run-realistic-active-benchmarks.sh "${{ github.workspace }}" main
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-active-main-reports
