      - name: Tear down realistic fixtures
        if: always()
        working-directory: ${{ github.workspace }}
        run: docker compose -f docker-compose.realistic.yml --profile realistic down -v

  benchmark-extended:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: siber
          POSTGRES_PASSWORD: siber
          POSTGRES_DB: siber
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: Verify pinned images
        run: python "${{ github.workspace }}/scripts/verify-pinned-images.py"
      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://siber:siber@localhost:5432/siber
        run: alembic upgrade head
      - name: Start realistic fixtures (closed network + ZAP daemon)
        working-directory: ${{ github.workspace }}
        run: docker compose -f docker-compose.realistic.yml --profile realistic up -d
      - name: Wait for realistic fixture health (incl. ZAP)
        working-directory: ${{ github.workspace }}
        run: bash scripts/wait-realistic-fixtures.sh "${{ github.workspace }}"
      - name: Run full realistic passive benchmarks (nightly, report-only)
        working-directory: ${{ github.workspace }}
        timeout-minutes: 25
        env:
          DATABASE_URL: postgresql+asyncpg://siber:siber@host.docker.internal:5432/siber
          REDIS_URL: redis://host.docker.internal:6379/0
          BENCHMARK_GATE_MODE: report
          BENCHMARK_STORAGE_PATH: /tmp/siber-benchmark
        run: bash scripts/run-realistic-passive-benchmarks.sh "${{ github.workspace }}"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-nightly-realistic-reports
          path: |
            /tmp/siber-benchmark/reports/*.json
            /tmp/siber-benchmark/reports/*.html
      - name: Tear down realistic fixtures
        if: always()
        working-directory: ${{ github.workspace }}
        run: docker compose -f docker-compose.realistic.yml --profile realistic down -v

  benchmark-blind:
    runs-on: ubuntu-latest
    needs: [backend]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Start closed benchmark fixtures
        working-directory: .
        run: docker compose -f docker-compose.benchmark.yml --profile benchmark up -d

      - name: Wait for benchmark fixture health
        working-directory: .
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:18080/ >/dev/null && exit 0
            sleep 2
          done
          echo "Benchmark web fixture failed health check"
          docker compose -f docker-compose.benchmark.yml --profile benchmark ps
          exit 1

      - name: Run Phase 11.4 benchmark tests
        run: pytest -q tests/test_benchmark_blind.py tests/test_benchmark_risk_eval.py tests/test_benchmark_ai_remediation_eval.py

      - name: Run blind benchmark (skips without secret)
        env:
          BLIND_GROUND_TRUTH_SECRET: ${{ secrets.BLIND_GROUND_TRUTH_SECRET }}
          BLIND_BENCHMARK_TARGET_URL: http://127.0.0.1:18080/
          SKIP_DOMAIN_VERIFICATION: "true"
        run: python -m app.benchmark blind

      - name: Tear down benchmark fixtures
        if: always()
        working-directory: .
        run: docker compose -f docker-compose.benchmark.yml --profile benchmark down -v

      - name: Run Risk Engine benchmark
        run: python -m app.benchmark risk-eval

      - name: Run AI remediation benchmark
        run: python -m app.benchmark ai-remediation-eval

      - name: Upload Phase 11.4 benchmark reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-blind-reports
          path: |
            benchmarks/reports/blind-benchmark.json
            benchmarks/reports/risk-engine-benchmark.json
            benchmarks/reports/ai-remediation-benchmark.json

  benchmark-realistic-full:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: siber
          POSTGRES_PASSWORD: siber
          POSTGRES_DB: siber
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: Verify pinned images
        run: python "${{ github.workspace }}/scripts/verify-pinned-images.py"
      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://siber:siber@localhost:5432/siber
        run: alembic upgrade head
      - name: Start realistic fixtures (closed network + ZAP daemon)
        working-directory: ${{ github.workspace }}
        run: docker compose -f docker-compose.realistic.yml --profile realistic up -d
      - name: Wait for realistic fixture health (incl. ZAP)
        working-directory: ${{ github.workspace }}
        run: bash scripts/wait-realistic-fixtures.sh "${{ github.workspace }}"
      - name: Run full realistic passive benchmarks (manual, report-only)
        working-directory: ${{ github.workspace }}
        timeout-minutes: 25
        env:
          DATABASE_URL: postgresql+asyncpg://siber:siber@host.docker.internal:5432/siber
          REDIS_URL: redis://host.docker.internal:6379/0
          BENCHMARK_GATE_MODE: report
          BENCHMARK_STORAGE_PATH: /tmp/siber-benchmark
        run: bash scripts/run-realistic-passive-benchmarks.sh "${{ github.workspace }}"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-realistic-full-reports
          path: |
            /tmp/siber-benchmark/reports/*.json
            /tmp/siber-benchmark/reports/*.html
      - name: Tear down realistic fixtures
        if: always()
        working-directory: ${{ github.workspace }}
        run: docker compose -f docker-compose.realistic.yml --profile realistic down -v

  benchmark-release-gates:
    runs-on: ubuntu-latest
    needs: [backend]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
