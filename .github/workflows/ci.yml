name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "30 2 * * *"

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: siber
          POSTGRES_PASSWORD: siber
          POSTGRES_DB: siber
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check app tests

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://siber:siber@localhost:5432/siber
        run: alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://siber:siber@localhost:5432/siber
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: development
          SKIP_DOMAIN_VERIFICATION: "true"
        run: pytest --cov=app --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t siber-api ./backend

      - name: Build Frontend image
        run: docker build -t siber-frontend ./frontend

  benchmark-smoke:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: siber
          POSTGRES_PASSWORD: siber
          POSTGRES_DB: siber
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://siber:siber@localhost:5432/siber
        run: alembic upgrade head

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql+asyncpg://siber:siber@localhost:5432/siber
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: development
          SKIP_DOMAIN_VERIFICATION: "true"
        run: pytest -q

      - name: Start closed benchmark fixtures
        working-directory: .
        run: docker compose -f docker-compose.benchmark.yml --profile benchmark up -d

      - name: Wait for benchmark fixture health
        working-directory: .
        run: |
          for i in $(seq 1 30); do
            web_ok=0
            api_ok=0
            curl -sf http://127.0.0.1:18080/ >/dev/null && web_ok=1 || true
            curl -sf http://127.0.0.1:18081/ >/dev/null && api_ok=1 || true
            if [ "$web_ok" = "1" ] && [ "$api_ok" = "1" ]; then
              echo "Benchmark fixtures healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Benchmark fixtures failed health check"
          docker compose -f docker-compose.benchmark.yml --profile benchmark ps
          exit 1

      - name: Build APK fixture
        working-directory: .
        run: python benchmarks/fixtures/android-smoke/build_fixture_apk.py

      - name: Run smoke benchmarks (report-only)
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://siber:siber@localhost:5432/siber
          REDIS_URL: redis://localhost:6379/0
          SKIP_DOMAIN_VERIFICATION: "true"
          BENCHMARK_GATE_MODE: report
          BENCHMARK_STORAGE_PATH: /tmp/siber-benchmark
        run: |
          python -m app.benchmark run --suite web-smoke
          python -m app.benchmark run --suite api-smoke
          python -m app.benchmark run --suite android-smoke

      - name: Upload benchmark reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-pr-reports
          path: |
            benchmarks/reports/*.json
            benchmarks/reports/*.html

      - name: Tear down benchmark fixtures
        if: always()
        working-directory: .
        run: docker compose -f docker-compose.benchmark.yml --profile benchmark down -v

  benchmark-main:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: siber
          POSTGRES_PASSWORD: siber
          POSTGRES_DB: siber
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://siber:siber@localhost:5432/siber
        run: alembic upgrade head
      - name: Run backend tests
        env:
          DATABASE_URL: postgresql+asyncpg://siber:siber@localhost:5432/siber
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: development
          SKIP_DOMAIN_VERIFICATION: "true"
        run: pytest -q
      - name: Start benchmark fixtures
        working-directory: .
        run: docker compose -f docker-compose.benchmark.yml --profile benchmark up -d
      - name: Wait for benchmark fixture health
        working-directory: .
        run: |
          for i in $(seq 1 30); do
            web_ok=0
            api_ok=0
            curl -sf http://127.0.0.1:18080/ >/dev/null && web_ok=1 || true
            curl -sf http://127.0.0.1:18081/ >/dev/null && api_ok=1 || true
            if [ "$web_ok" = "1" ] && [ "$api_ok" = "1" ]; then
              echo "Benchmark fixtures healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Benchmark fixtures failed health check"
          docker compose -f docker-compose.benchmark.yml --profile benchmark ps
          exit 1
      - name: Build APK fixture
        working-directory: .
        run: python benchmarks/fixtures/android-smoke/build_fixture_apk.py
      - name: Run smoke suites (report-only)
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://siber:siber@localhost:5432/siber
          REDIS_URL: redis://localhost:6379/0
          SKIP_DOMAIN_VERIFICATION: "true"
          BENCHMARK_GATE_MODE: report
          BENCHMARK_STORAGE_PATH: /tmp/siber-benchmark
        run: |
          python -m app.benchmark run --suite web-smoke
          python -m app.benchmark run --suite api-smoke
          python -m app.benchmark run --suite android-smoke
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-main-reports
          path: |
            benchmarks/reports/*.json
            benchmarks/reports/*.html
      - name: Tear down benchmark fixtures
        if: always()
        working-directory: .
        run: docker compose -f docker-compose.benchmark.yml --profile benchmark down -v

  benchmark-extended:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate extended benchmark manifest contract
        run: |
          test -f benchmarks/fixtures/web-smoke/ground-truth.yaml
          test -f benchmarks/fixtures/api-smoke/ground-truth.yaml
          test -f benchmarks/fixtures/android-smoke/ground-truth.yaml
